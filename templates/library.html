{% extends "base.html" %}

{% block title %}RAG 知識庫 - AI Prompt Generator{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 mb-4">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="fas fa-book"></i> RAG 知識庫
                </h5>
                <button class="btn btn-light btn-sm" data-bs-toggle="modal" data-bs-target="#uploadModal">
                    <i class="fas fa-upload"></i> 上傳文件
                </button>
            </div>
            <div class="card-body">
                <p class="text-muted">
                    上傳您的提示詞範本，建立個人知識庫。系統會自動進行向量化，支援語義搜尋。
                </p>

                <!-- 搜尋框 -->
                <div class="row mb-4">
                    <div class="col-md-8">
                        <input type="text" class="form-control" id="search-input" placeholder="輸入關鍵字進行語義搜尋...">
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" id="search-btn">
                            <i class="fas fa-search"></i> 搜尋
                        </button>
                    </div>
                </div>

                <!-- 搜尋結果 -->
                <div id="search-results"></div>

                <!-- 文件列表 -->
                <div id="documents-list">
                    <p class="text-center text-muted">載入中...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 上傳模態框 -->
<div class="modal fade" id="uploadModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">上傳文件到知識庫</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="upload-form">
                    <div class="mb-3">
                        <label class="form-label">選擇文件</label>
                        <input type="file" class="form-control" id="file-input" accept=".txt,.md,.pdf,.docx" required>
                        <div class="form-text">支援格式：.txt, .md, .pdf, .docx</div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="upload-btn">上傳</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// RAG 知識庫頁面邏輯（簡化版）
document.addEventListener('DOMContentLoaded', function() {
    // 頁面載入時取得文件列表
    loadDocuments();

    // 搜尋功能
    document.getElementById('search-btn').addEventListener('click', async function() {
        const query = document.getElementById('search-input').value;
        if (!query) {
            showNotification('請輸入搜尋關鍵字', 'warning');
            return;
        }

        try {
            const result = await apiRequest('/rag/search', 'POST', { query });
            displaySearchResults(result.results);
        } catch (error) {
            showNotification('搜尋失敗: ' + error.message, 'danger');
        }
    });

    // 上傳功能
    document.getElementById('upload-btn').addEventListener('click', async function() {
        const fileInput = document.getElementById('file-input');
        if (!fileInput.files.length) {
            showNotification('請選擇檔案', 'warning');
            return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        try {
            const response = await fetch('/api/rag/upload', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                showNotification('檔案上傳成功！', 'success');
                bootstrap.Modal.getInstance(document.getElementById('uploadModal')).hide();
                fileInput.value = '';
                loadDocuments(); // 重新載入文件列表
            } else {
                throw new Error(result.error);
            }
        } catch (error) {
            showNotification('上傳失敗: ' + error.message, 'danger');
        }
    });
});

// 載入文件列表
async function loadDocuments() {
    const container = document.getElementById('documents-list');
    try {
        const response = await fetch('/api/rag/documents');
        const result = await response.json();

        if (result.success && result.documents.length > 0) {
            let html = '<h6 class="mb-3">已上傳的文件：</h6>';
            result.documents.forEach(doc => {
                const filename = doc.metadata?.filename || doc.id;
                html += `
                    <div class="card mb-2">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <i class="fas fa-file-alt text-primary me-2"></i>
                                <strong>${filename}</strong>
                                <small class="text-muted ms-2">(${doc.chunks} 個片段)</small>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        } else {
            container.innerHTML = '<p class="text-center text-muted">目前沒有上傳的文件，請點擊「上傳文件」開始建立知識庫。</p>';
        }
    } catch (error) {
        container.innerHTML = '<p class="text-center text-danger">載入文件列表失敗</p>';
    }
}

function displaySearchResults(results) {
    const container = document.getElementById('search-results');
    if (!results || results.length === 0) {
        container.innerHTML = '<p class="text-muted">沒有找到相關結果</p>';
        return;
    }

    let html = '<h6 class="mb-3">搜尋結果：</h6>';
    results.forEach(result => {
        html += `
            <div class="card mb-2">
                <div class="card-body">
                    <p class="mb-1">${result.content}</p>
                    <small class="text-muted">相似度: ${(1 - result.distance).toFixed(2)}</small>
                </div>
            </div>
        `;
    });

    container.innerHTML = html;
}
</script>
{% endblock %}
