{% extends "base.html" %}

{% block title %}歷史記錄 - AI Prompt Generator{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card shadow-sm">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">
                    <i class="fas fa-history"></i> 生成歷史記錄
                </h5>
            </div>
            <div class="card-body">
                <p class="text-muted">查看您之前生成的提示詞記錄</p>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>時間</th>
                                <th>專案類型</th>
                                <th>AI 模型</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body">
                            <tr>
                                <td colspan="4" class="text-center text-muted">暫無記錄</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
